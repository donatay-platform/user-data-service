databaseChangeLog:
  - changeSet:
      id: 1
      author: expert
      changes:
        - createSequence:
            sequenceName: users_id_seq
            startValue: 1
            incrementBy: 1

        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: nickname
                  type: VARCHAR(100)
              - column:
                  name: avatar_url
                  type: VARCHAR(500)
              - column:
                  name: header_url
                  type: VARCHAR(500)
              - column:
                  name: mfa_enabled
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: mfa_type
                  type: VARCHAR(50)
              - column:
                  name: mfa_secret
                  type: VARCHAR(255)
              - column:
                  name: phone_number
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
