version: '3.8'

services:
  donation-db:
    image: postgres:16-alpine
    container_name: donation-postgres-db
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: donation_db
      POSTGRES_USER: donation_local
      POSTGRES_PASSWORD: local_dev_password_change_me
    volumes:
      - donation_db_data:/var/lib/postgresql/data

volumes:
  donation_db_data:
    driver: local
