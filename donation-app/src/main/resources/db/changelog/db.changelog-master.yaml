databaseChangeLog:
  - changeSet:
      id: 1
      author: expert
      changes:
        - createSequence:
            sequenceName: users_id_seq
            startValue: 1
            incrementBy: 1

        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: "nextval('users_id_seq')"
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: nickname
                  type: VARCHAR(100)
              - column:
                  name: avatar_url
                  type: VARCHAR(500)
              - column:
                  name: header_url
                  type: VARCHAR(500)
              - column:
                  name: mfa_enabled
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: mfa_type
                  type: VARCHAR(50)
              - column:
                  name: mfa_secret
                  type: VARCHAR(255)
              - column:
                  name: phone_number
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 2
      author: arena-agent
      comment: Move user data tables from public schema to dedicated service schema.
      changes:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              CREATE SCHEMA IF NOT EXISTS user_data_service;
              ALTER SEQUENCE IF EXISTS public.users_id_seq SET SCHEMA user_data_service;
              ALTER TABLE IF EXISTS public.users SET SCHEMA user_data_service;
              ALTER TABLE IF EXISTS user_data_service.users
                ALTER COLUMN id SET DEFAULT nextval('user_data_service.users_id_seq');
